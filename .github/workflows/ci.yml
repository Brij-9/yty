name: CI
on:
  push:
  pull_request:
permissions:
  contents: read
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -e ".[dev]"
      - run: python -m unittest discover -s tests -v
      - run: python -m compileall -q app scripts
      - run: |
          python -m uvicorn app.main:app --host 127.0.0.1 --port 7860 &
          pid=$!
          trap 'kill $pid' EXIT
          python - <<'PY'
          import json, time, urllib.request
          for _ in range(30):
              try:
                  with urllib.request.urlopen('http://127.0.0.1:7860/api/health') as r:
                      assert json.load(r)['status'] == 'ok'
                      break
              except Exception:
                  time.sleep(1)
          else:
              raise SystemExit('API health check failed')
          PY
  containers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -f docker/Dockerfile.api -t openvideo-local-api:test .
